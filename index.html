<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스네이크 게임</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #2c3e50;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin-top: 50px;
        }
        canvas {
            background-color: #34495e;
            border: 4px solid #ecf0f1;
            border-radius: 5px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .score-board {
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .instructions {
            margin-top: 15px;
            font-size: 14px;
            color: #bdc3c7;
        }
    </style>
</head>
<body>

    <div class="score-board">점수: <span id="score">0</span></div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="instructions">조작법: 방향키 (위, 아래, 왼쪽, 오른쪽)</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        // 게임 설정
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        let score = 0;

        // 뱀 초기화
        let snake = [
            { x: 10, y: 10 }
        ];
        let velocityX = 0;
        let velocityY = 0;

        // 사과 초기화
        let appleX = 15;
        let appleY = 15;

        // 게임 루프 시작
        let gameLoop = setInterval(drawGame, 100);

        function drawGame() {
            // 뱀 위치 업데이트
            let headX = snake[0].x + velocityX;
            let headY = snake[0].y + velocityY;

            // 벽 충돌 체크 (게임 오버)
            if (headX < 0 || headX >= tileCount || headY < 0 || headY >= tileCount) {
                gameOver();
                return;
            }

            // 자기 몸 충돌 체크 (게임 오버)
            for (let i = 0; i < snake.length; i++) {
                if (headX === snake[i].x && headY === snake[i].y && snake.length > 1) {
                    gameOver();
                    return;
                }
            }

            // 뱀 머리 추가
            snake.unshift({ x: headX, y: headY });

            // 사과를 먹었는지 확인
            if (headX === appleX && headY === appleY) {
                score += 10;
                scoreElement.innerText = score;
                spawnApple();
            } else {
                // 사과를 먹지 않았다면 꼬리 자르기 (이동 효과)
                snake.pop();
            }

            // 화면 지우기
            ctx.fillStyle = "#34495e";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 사과 그리기
            ctx.fillStyle = "#e74c3c";
            ctx.fillRect(appleX * gridSize, appleY * gridSize, gridSize - 2, gridSize - 2);

            // 뱀 그리기
            for (let i = 0; i < snake.length; i++) {
                ctx.fillStyle = (i === 0) ? "#2ecc71" : "#27ae60"; // 머리는 밝은 초록, 몸통은 어두운 초록
                ctx.fillRect(snake[i].x * gridSize, snake[i].y * gridSize, gridSize - 2, gridSize - 2);
            }
        }

        function spawnApple() {
            appleX = Math.floor(Math.random() * tileCount);
            appleY = Math.floor(Math.random() * tileCount);
            
            // 사과가 뱀 몸통 위에 생성되지 않도록 체크
            for (let i = 0; i < snake.length; i++) {
                if (appleX === snake[i].x && appleY === snake[i].y) {
                    spawnApple();
                    break;
                }
            }
        }

        function gameOver() {
            clearInterval(gameLoop);
            ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = "white";
            ctx.font = "30px Arial";
            ctx.textAlign = "center";
            ctx.fillText("게임 오버!", canvas.width / 2, canvas.height / 2);
            ctx.font = "20px Arial";
            ctx.fillText("새로고침(F5)하여 다시 시작하세요.", canvas.width / 2, canvas.height / 2 + 40);
        }

        // 키보드 입력 처리
        document.addEventListener("keydown", function(event) {
            // 위로 이동
            if (event.code === "ArrowUp" && velocityY !== 1) {
                velocityX = 0;
                velocityY = -1;
            }
            // 아래로 이동
            else if (event.code === "ArrowDown" && velocityY !== -1) {
                velocityX = 0;
                velocityY = 1;
            }
            // 왼쪽으로 이동
            else if (event.code === "ArrowLeft" && velocityX !== 1) {
                velocityX = -1;
                velocityY = 0;
            }
            // 오른쪽으로 이동
            else if (event.code === "ArrowRight" && velocityX !== -1) {
                velocityX = 1;
                velocityY = 0;
            }
        });
    </script>
</body>
</html>
